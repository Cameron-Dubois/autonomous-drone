# Compile-only smoke: ensures ESP-IDF projects still configure and build.
# Runs only when work targets the drone_ble or drone_wifi Git branches (not main, etc.).
name: Firmware smoke

on:
  push:
    branches: [drone_ble, drone_wifi]
  pull_request:
    branches: [drone_ble, drone_wifi]

jobs:
  idf-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: drone_ble
          - path: drone_wifi/softAP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (${{ matrix.path }})
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32c3
          path: ${{ matrix.path }}
