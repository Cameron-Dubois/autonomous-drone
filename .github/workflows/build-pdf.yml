name: Build PDF

on:
  push:
    branches: [main]
    paths:
      - 'documentation/markdown/**'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-extra-utils texlive-latex-extra

      - name: Build PDF
        run: |
          cd documentation/markdown
          pandoc \
            1_Executive_Summary.md \
            2_Table_of_Contents.md \
            3_Introduction.md \
            4_Design.md \
            5_Evaluation.md \
            6_Appendix_1.md \
            7_Appendix_2.md \
            8_Appendix_3.md \
            9_Appendix_4.md \
            -o ../Group_3_Design_Document.pdf \
            --pdf-engine=pdflatex \
            -V geometry:margin=1in \
            -V fontsize=11pt

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documentation/Group_3_Design_Document.pdf
          git diff --staged --quiet || git commit -m "Auto-generate Group_3_Design_Document.pdf [skip ci]"
          git push
